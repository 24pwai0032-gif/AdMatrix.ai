# Production overrides — use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    environment:
      ENVIRONMENT: production
      USE_GUNICORN: "true"
      WEB_CONCURRENCY: "4"
      DEMO_MODE: "false"
    deploy:
      resources:
        limits:
          memory: 2G

  celery-worker:
    deploy:
      resources:
        limits:
          memory: 4G

  postgres:
    restart: always

  redis:
    restart: always
